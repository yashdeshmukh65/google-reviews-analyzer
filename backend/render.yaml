services:
  - type: web
    name: gra-backend
    env: python
    buildCommand: "pip install -r requirements.txt && python -m textblob.download_corpora"
    startCommand: "gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: GROQ_API_KEY
        sync: false
