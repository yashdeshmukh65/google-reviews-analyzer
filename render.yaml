services:
  # Backend Web Service
  - type: web
    name: gra-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false # User must provide this in the Render dashboard

  # Frontend Static Site
  - type: web
    name: gra-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: gra-backend
          envVarKey: RENDER_EXTERNAL_URL
